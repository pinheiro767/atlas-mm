<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ultra Atlas MMSS</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <header class="topbar">
    <div>
      <h1>Ultra Atlas MMSS</h1>
      <p>Anatomia Topográfica Interativa</p>
    </div>

    <button id="btnInstall" class="install-btn">📲 Baixe o app</button>
  </header>

  <main class="app">

    <section class="panel">

      <div class="toolbar">
        <select id="secaoSelect"></select>
        <input id="buscarInput" type="number" min="1" max="159" placeholder="Ir para imagem..." />
      </div>

      <h2 id="tituloImagem">Imagem 1 de 159</h2>
      <p id="secaoAtual">Regiões</p>

      <div class="image-wrapper" id="imageWrapper">
        <img id="atlasImage" src="./imagens/1.png" alt="Imagem anatômica" />
      </div>

      <div class="controls">
        <button id="btnVoltar">⬅ Voltar</button>
        <button id="btnAvancar">Avançar ➡</button>
        <button id="btnZoom">🔍 Zoom</button>
        <button id="btnLeitura">🔊 Leitura</button>
        <button id="btnPDF">📄 Gerar PDF</button>
      </div>

      <section class="notes">
        <label for="observacao">Observações desta imagem</label>
        <textarea id="observacao" placeholder="Digite aqui suas observações, legendas ou identificação anatômica..."></textarea>
        <button id="btnSalvarObs">💾 Salvar observação</button>
      </section>

    </section>

  </main>

  <script src="./app.js"></script>
</body>
</html>

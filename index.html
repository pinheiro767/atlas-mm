<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ultra Atlas MMSS</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="topbar">
    <div>
      <h1>Ultra Atlas MMSS</h1>
      <p>Anatomia Topográfica Interativa</p>
    </div>

    <button id="btnInstalar" type="button">📲 Baixe o app</button>
  </header>

  <nav class="menu">
    <button type="button" onclick="mostrarAba('atlas')">Atlas</button>
    <button type="button" onclick="mostrarAba('roteiro')">Roteiro</button>
    <button type="button" onclick="mostrarAba('relacoes')">Relações e Comparações</button>
    <button type="button" onclick="mostrarAba('saibaMais')">Saiba Mais</button>
    <button type="button" onclick="ativarModoProva()">Modo Prova</button>
    <button type="button" onclick="gerarPDFTodas()">Gerar PDF completo</button>
  </nav>

  <main>
    <section id="abaAtlas" class="aba ativa">
      <div class="filtros">
        <select id="secaoSelect"></select>
        <input id="buscaInput" type="search" placeholder="Buscar por número..." />
      </div>

      <h2 id="tituloImagem">Imagem 1 de 159</h2>
      <p id="secaoAtual">Regiões</p>

      <div class="viewer">
        <img id="atlasImage" src="./imagens/1.png" alt="Imagem anatômica 1" />
      </div>

      <div class="controls">
        <button type="button" onclick="imagemAnterior()">← Anterior</button>
        <button type="button" onclick="proximaImagem()">Próxima →</button>
        <button type="button" onclick="ouvirImagem()">🔊 Ouvir</button>
        <button type="button" onclick="toggleZoom()">🔍 Zoom</button>
      </div>

      <div class="observacoes">
        <label for="observacaoTexto">Observações da imagem</label>
        <textarea
          id="observacaoTexto"
          placeholder="Digite observações, relações anatômicas, detalhes da peça..."
        ></textarea>
        <button type="button" onclick="salvarObservacao()">💾 Salvar observação</button>
      </div>
    </section>

    <section id="abaRoteiro" class="aba">
      <h2>Roteiro do Atlas</h2>
      <div id="listaRoteiro"></div>
    </section>

    <section id="abaRelacoes" class="aba">
      <h2>Relações e Comparações Rápidas</h2>
      <div id="infoEstrutura" class="card"></div>
    </section>

    <section id="abaSaibaMais" class="aba">
      <h2>Saiba Mais — Anatomia Clínica e Relações Finas</h2>

      <div class="controls">
        <button type="button" onclick="ouvirSaibaMais()">🔊 Ouvir Saiba Mais</button>
        <button type="button" onclick="pararAudio()">⏹️ Parar áudio</button>
      </div>

      <div id="conteudoSaibaMais" class="card saiba-mais"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>

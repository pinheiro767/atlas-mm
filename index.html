<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ultra Atlas MMSS</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b0f2a" />

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <header class="topbar">
    <div>
      <h1>Ultra Atlas MMSS</h1>
      <p>Anatomia Topográfica Interativa</p>
    </div>

    <button id="btnInstalar" type="button">📲 Baixe o app</button>
  </header>

  <nav class="menu">
    <button type="button" onclick="mostrarAba('atlas')">Atlas</button>
    <button type="button" onclick="mostrarAba('roteiro')">Roteiro</button>
    <button type="button" onclick="mostrarAba('relacoes')">Relações</button>
    <button type="button" onclick="mostrarAba('saibaMais')">Saiba Mais</button>
    <button type="button" onclick="ativarModoProva()">Modo Prova</button>
    <button type="button" onclick="gerarPDFTodas()">PDF</button>
  </nav>

  <main>

    <!-- ATLAS -->
    <section id="abaAtlas" class="aba ativa">

      <div class="filtros">
        <select id="secaoSelect"></select>
        <input id="buscaInput" type="search" placeholder="Ir para imagem..." />
      </div>

      <h2 id="tituloImagem">Imagem 1 de 159</h2>
      <p id="secaoAtual">Regiões</p>

      <div class="viewer">
        <img id="atlasImage" src="./imagens/1.png" alt="Imagem anatômica 1" />
      </div>

      <div class="controls">
        <button onclick="imagemAnterior()">←</button>
        <button onclick="proximaImagem()">→</button>
        <button onclick="ouvirImagem()">🔊</button>
        <button onclick="toggleZoom()">🔍</button>
      </div>

      <div class="observacoes">
        <label>Observações</label>
        <textarea id="observacaoTexto"></textarea>
        <button onclick="salvarObservacao()">Salvar</button>
      </div>

    </section>

    <!-- ROTEIRO -->
    <section id="abaRoteiro" class="aba">
      <h2>Roteiro</h2>
      <div id="listaRoteiro"></div>
    </section>

    <!-- RELAÇÕES -->
    <section id="abaRelacoes" class="aba">
      <h2>Relações</h2>
      <div id="infoEstrutura" class="card"></div>
    </section>

    <!-- SAIBA MAIS -->
    <section id="abaSaibaMais" class="aba">
      <h2>Saiba Mais</h2>

      <div class="controls">
        <button onclick="ouvirSaibaMais()">🔊</button>
        <button onclick="pararAudio()">⏹</button>
      </div>

      <div id="conteudoSaibaMais" class="card"></div>
    </section>

  </main>

  <!-- APP -->
  <script src="./app.js"></script>

  <!-- SERVICE WORKER (ESSENCIAL) -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js")
        .then(() => console.log("SW ativo"))
        .catch(err => console.log("Erro SW:", err));
    }
  </script>

</body>
</html>

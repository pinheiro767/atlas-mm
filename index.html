<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Atlas MMSS</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="topbar">
  <h1>Ultra Atlas MMSS</h1>
  <button id="btnInstalar">📲 Baixe o app</button>
</header>

<main>

  <select id="secaoSelect"></select>
  <input id="buscaInput" type="search" placeholder="Buscar estrutura ou número">

  <div class="viewer">
    <button id="btnAnterior">⬅️</button>

    <div>
      <img id="imagem" src="./imagens/1.png" alt="Imagem anatômica">
      <p id="contador">1 / 159</p>
    </div>

    <button id="btnProxima">➡️</button>
  </div>

  <h2 id="legenda">Imagem 1</h2>

  <div class="actions">
    <button id="btnAudio">🔊 Ouvir</button>
    <button id="btnInfo">ℹ️ Relações</button>
    <button id="btnPDF">📄 PDF</button>
    <button id="btnLimparZoom">🔍 Reset zoom</button>
    <button id="btnVoz">🎙️ Voz</button>
  </div>

  <section id="infoBox"></section>

  <section>
    <h2>Roteiro</h2>
    <div id="roteiroLista"></div>
  </section>

  <section>
    <h2>Relações e comparações</h2>
    <div id="relacoesLista"></div>
  </section>

  <section>
    <h2>Modo prova</h2>
    <button id="btnIniciarProva">🧪 Iniciar prova</button>
    <button id="btnRevelar">👁️ Mostrar resposta</button>
    <h3 id="respostaProva"></h3>
  </section>

</main>

<script src="./dados.js"></script>
<script src="./app.js"></script>

</body>
</html>
